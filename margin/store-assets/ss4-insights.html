<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="scene">
  <div class="chip">
    <div class="mark"><img src="/img/icon.png"></div>
    <span class="name">Margin</span><span class="sep">/</span><span class="act">Your reading dashboard</span>
  </div>
  <div class="win">
    <div class="win-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <div class="win-url"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>your favourite site — reading in the margin</div>
    </div>
    <div class="wbody">
      <div class="page">
        <div class="ph"></div><div class="ph w2"></div>
        <div class="pimg"></div>
        <div class="pl s2"></div><div class="pl s1"></div><div class="pl s3"></div><div class="pl s2"></div><div class="pl s4"></div>
        <div class="pgap"></div>
        <div class="pl s1"></div><div class="pl s2"></div><div class="pl s3"></div>
      </div>
      <div class="dock">
        <div class="mh"><span class="lg"><img src="/img/icon.png">Margin</span>
          <span class="ic"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span></div>
        <div class="mbody">
          <div class="thead" style="font-size:20px;margin-bottom:14px">Insights</div>
          <div class="istat">
            <div class="s"><b>128</b><span>cards read this week</span></div>
            <div class="s"><b>9<span class="u"> days</span></b><span>reading streak</span></div>
            <div class="s"><b>42<span class="u"> min</span></b><span>time saved vs full articles</span></div>
            <div class="s"><b>6</b><span>topics followed</span></div>
          </div>
          <div class="ibars">
            <div class="t">What you read most</div>
            <div class="bar"><span class="nm">Technology</span><span class="tr"><span class="fl" style="width:88%"></span></span><span class="v">38</span></div>
            <div class="bar"><span class="nm">AI</span><span class="tr"><span class="fl" style="width:72%"></span></span><span class="v">31</span></div>
            <div class="bar"><span class="nm">Science</span><span class="tr"><span class="fl" style="width:54%"></span></span><span class="v">23</span></div>
            <div class="bar"><span class="nm">World</span><span class="tr"><span class="fl" style="width:40%"></span></span><span class="v">17</span></div>
            <div class="bar"><span class="nm">Business</span><span class="tr"><span class="fl" style="width:28%"></span></span><span class="v">12</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
