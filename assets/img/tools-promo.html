<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:800px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 10% 10%,rgba(99,102,241,.4),transparent 55%),radial-gradient(ellipse 60% 60% at 95% 90%,rgba(124,58,237,.45),transparent 55%),linear-gradient(150deg,#0f0c1a 0%,#1a1535 50%,#0d1117 100%)}
.stars{position:absolute;inset:0;opacity:.35;background-image:radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.9),transparent),radial-gradient(1px 1px at 45% 10%,rgba(255,255,255,.7),transparent),radial-gradient(1px 1px at 75% 30%,rgba(255,255,255,.9),transparent),radial-gradient(1px 1px at 25% 75%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 85% 60%,rgba(255,255,255,.8),transparent)}
.wrap{position:absolute;inset:0;display:flex;align-items:center;padding:0 80px;gap:60px}
.left{flex:0 0 400px;color:#fff}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.brand-icon{width:48px;height:48px;border-radius:13px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.15)}
.brand-icon img{width:100%;height:100%;display:block}
.brand-nm{font-size:22px;font-weight:800;letter-spacing:-.02em;opacity:.9}
.h{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1.06}
.h .g{background:linear-gradient(90deg,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{margin-top:16px;font-size:17px;color:rgba(255,255,255,.6);line-height:1.6;max-width:340px}
.stat{margin-top:28px;display:flex;gap:28px}
.stat-n{font-size:30px;font-weight:800;color:#a78bfa}
.stat-l{font-size:13px;color:rgba(255,255,255,.5);margin-top:2px}
.right{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chip{padding:14px 18px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px}
.chip svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;opacity:.8}
.chip-t{font-size:14px;font-weight:600;color:rgba(255,255,255,.85)}
.c0{color:#818cf8}.c1{color:#34d399}.c2{color:#fb923c}.c3{color:#f472b6}.c4{color:#facc15}.c5{color:#38bdf8}.c6{color:#a3e635}.c7{color:#f87171}.c8{color:#c084fc}.c9{color:#22d3ee}
</style></head><body>
<div class="bg"></div><div class="stars"></div>
<div class="wrap">
  <div class="left">
    <div class="brand">
      <div class="brand-icon"><img src="tools-icon.png" alt="tapdot tools"></div>
      <span class="brand-nm">tapdot tools</span>
    </div>
    <div class="h">90+ tools.<br><span class="g">One place.</span></div>
    <div class="sub">Privacy-first web tools that run entirely in your browser — no account, no server, nothing sent anywhere.</div>
    <div class="stat">
      <div><div class="stat-n">90+</div><div class="stat-l">tools</div></div>
      <div><div class="stat-n">10</div><div class="stat-l">categories</div></div>
      <div><div class="stat-n">0</div><div class="stat-l">accounts</div></div>
    </div>
  </div>
  <div class="right">
    <div class="chip"><svg class="c0" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><div><div class="chip-t">Study</div></div></div>
    <div class="chip"><svg class="c1" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg><div><div class="chip-t">Write</div></div></div>
    <div class="chip"><svg class="c2" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><div><div class="chip-t">Dev</div></div></div>
    <div class="chip"><svg class="c3" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/></svg><div><div class="chip-t">Design</div></div></div>
    <div class="chip"><svg class="c4" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><div><div class="chip-t">Finance</div></div></div>
    <div class="chip"><svg class="c5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><div><div class="chip-t">Health</div></div></div>
    <div class="chip"><svg class="c6" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><div><div class="chip-t">HR</div></div></div>
    <div class="chip"><svg class="c7" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><div><div class="chip-t">Legal</div></div></div>
    <div class="chip"><svg class="c8" viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg><div><div class="chip-t">Marketing</div></div></div>
    <div class="chip"><svg class="c9" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><div><div class="chip-t">Productivity</div></div></div>
  </div>
</div>
</body></html>
